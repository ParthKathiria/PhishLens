name: Run Tests     # shows up as the workflow's name in Github's "Actions" tab

# runs on -> WHEN does this run?:
on:
    push:                      # run everytime someone pushes a commit
        branches: [main]
    pull_request:           # also run on every PR, so you can see pass/fail before merging
        branches: [main]

# jobs -> WHAT does it do?
jobs:
    test:           # name of the job
        runs-on: ubuntu-latest      # spins up a fresh Ubuntu VM to run this job on

        steps:
            # Step 1: pull the repo's code onto that fresh VM (it starts empty)
            - name: Check out code
              uses: actions/checkout@v7
            
            # Step 2: install the Python version the project uses, and caches pip's
            # download packages. setup-python has caching built in - point it at the
            # requirements.txt and it hashes that file. If the file hasn't changed
            # since last run, it restores the cached packages instead of re-downloading
            # everything from PyPI.
            - name: Set up Python
              uses: actions/setup-python@v7
              with:
                python-version: "3.14"
                cache: "pip"
                cache-dependency-path: backend/requirements.txt
            
            # Step 3: install the project's dependencies
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r backend/requirements.txt
                pip install pytest

            # Step 4: actually runs the test suite
            - name: Run tests
              working-directory: backend
              run: pytest
